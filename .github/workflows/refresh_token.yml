name: Refresh Google Token

on:
  schedule:
    - cron: '*/50 * * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Library
        run: npm install google-auth-library

      - name: Inject Token
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          node -e "
          const {GoogleAuth} = require('google-auth-library');
          const fs = require('fs');
          async function run() {
            try {
              const auth = new GoogleAuth({
                credentials: JSON.parse(process.env.GCP_KEY),
                // FIX: Full drive scope prevents 403 Access Denied
                scopes: ['https://www.googleapis.com/auth/drive']
              });
              const client = await auth.getClient();
              const tokenResponse = await client.getAccessToken();
              const token = tokenResponse.token;
              
              let content = fs.readFileSync('index.html', 'utf8');
              
              // Regex finds everything between the BOT_ZONE tags and overwrites it
              const regex = /\/\/ --- BOT_ZONE_START ---[\s\S]*?\/\/ --- BOT_ZONE_END ---/;
              const replacement = '// --- BOT_ZONE_START ---\nconst ACCESS_TOKEN = \"' + token + '\"; \n// --- BOT_ZONE_END ---';
              
              const newContent = content.replace(regex, replacement);
              
              if (content === newContent) {
                console.error('ERROR: Could not find BOT_ZONE tags in index.html');
                process.exit(1);
              }

              fs.writeFileSync('index.html', newContent);
              console.log('Success: Token updated with full Drive scope.');
            } catch (err) {
              console.error('Critical Error:', err.message);
              process.exit(1);
            }
          }
          run();
          "

      - name: Commit and Push
        run: |
          git config --global user.name "AirShare Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          git commit -m "Auto-update Token [skip ci]" || echo "No changes"
          git push
