name: Refresh Google Token

on:
  schedule:
    # This runs automatically every 50 minutes, 24/7
    - cron: '*/50 * * * *'
  workflow_dispatch: # This allows you to run it manually whenever you want

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Google Auth Library
        run: npm install google-auth-library

      - name: Inject Token
        env:
          GCP_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        run: |
          node -e "
          const {GoogleAuth} = require('google-auth-library');
          const fs = require('fs');
          async function run() {
            try {
              const auth = new GoogleAuth({
                credentials: JSON.parse(process.env.GCP_KEY),
                scopes: ['https://www.googleapis.com/auth/drive']
              });
              const client = await auth.getClient();
              const tokenResponse = await client.getAccessToken();
              const token = tokenResponse.token;
              
              let content = fs.readFileSync('index.html', 'utf8');
              // This line finds const ACCESS_TOKEN = \"...\"; and replaces it cleanly
              content = content.replace(/const ACCESS_TOKEN = \".*\";/, 'const ACCESS_TOKEN = \"' + token + '\";');
              fs.writeFileSync('index.html', content);
              console.log('Token successfully injected into index.html');
            } catch (error) {
              console.error('Error injecting token:', error);
              process.exit(1);
            }
          }
          run();
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name "AirShare Bot"
          git config --global user.email "actions@github.com"
          git add index.html
          # Only commit if the file actually changed to avoid errors
          git commit -m "Auto-update Google Token [skip ci]" || echo "No changes to commit"
          git push
