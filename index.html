<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirShare | 10GB</title>
    <style>
        :root { --bg: #0f172a; --card: #1e293b; --accent: #38bdf8; }
        body { font-family: sans-serif; background: var(--bg); color: #f8fafc; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .box { background: var(--card); padding: 2rem; border-radius: 1rem; width: 90%; max-width: 400px; text-align: center; border: 1px solid #334155; }
        #prog-container { width: 100%; background: #334155; height: 10px; border-radius: 5px; display: none; margin: 1rem 0; overflow: hidden; }
        #prog-bar { background: var(--accent); width: 0%; height: 100%; }
        button { background: var(--accent); color: var(--bg); border: none; padding: 1rem; border-radius: 0.5rem; font-weight: bold; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="color:var(--accent)">AirShare</h2>
        <input type="file" id="fileInput">
        <button id="uploadBtn" onclick="upload()">Start Upload</button>
        <div id="prog-container"><div id="prog-bar"></div></div>
        <div id="status" style="margin-top:1rem; color:var(--accent)">Ready</div>

const FOLDER_ID = "1X25xBP2FPyFgVaPXYJ8S07yXgzGffUDO";

async function upload() {
    const file = document.getElementById('fileInput').files[0];
    if (!file) return alert("Select a file.");
    const btn = document.getElementById('uploadBtn');
    const status = document.getElementById('status');
    const bar = document.getElementById('prog-bar');
    const container = document.getElementById('prog-container');
    
    btn.disabled = true;
    container.style.display = 'block';
    status.innerText = "Connecting...";

    try {
        const metadata = { name: file.name, parents: [FOLDER_ID] };
        const response = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=resumable', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${ACCESS_TOKEN}`,
                'Content-Type': 'application/json',
                'X-Upload-Content-Type': file.type,
                'X-Upload-Content-Length': file.size
            },
            body: JSON.stringify(metadata)
        });

        if (!response.ok) throw new Error();
        const uploadUrl = response.headers.get('Location');
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', uploadUrl);
        xhr.upload.onprogress = (e) => {
            const p = Math.round((e.loaded / e.total) * 100);
            bar.style.width = p + '%';
            status.innerText = `Uploading: ${p}%`;
        };
        xhr.onload = () => { status.innerText = "✅ Done!"; btn.disabled = false; };
        xhr.send(file);
    } catch (e) {
        status.innerText = "❌ Error: Token Expired. Run Action.";
        btn.disabled = false;
    }
}
</script>
