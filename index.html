<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirShare | Cloud Drop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 0.3rem; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }
        .drop-zone {
            border: 2px dashed #334155;
            border-radius: 1rem;
            padding: 2rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #38bdf8;
            background: rgba(56,189,248,0.05);
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .drop-text { color: #94a3b8; font-size: 0.9rem; }
        .drop-text span { color: #38bdf8; }
        #file-list {
            margin-top: 0.75rem;
            text-align: left;
            max-height: 130px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3rem 0.5rem;
            border-radius: 0.4rem;
            font-size: 0.78rem;
            margin-bottom: 0.25rem;
            background: #0f172a;
        }
        .file-item-name { color: #94a3b8; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 200px; }
        .file-item-size { color: #475569; font-size: 0.72rem; white-space: nowrap; margin-left: 0.4rem; }
        .file-item-status { margin-left: 0.4rem; font-size: 0.8rem; }
        #progress-section { display: none; margin-bottom: 1rem; }
        #progress-label { display: flex; justify-content: space-between; font-size: 0.75rem; color: #64748b; margin-bottom: 0.4rem; }
        #progress-label span:last-child { color: #38bdf8; }
        #prog-container { width: 100%; background: #334155; height: 10px; border-radius: 5px; overflow: hidden; margin-bottom: 0.4rem; }
        #prog-bar { background: linear-gradient(90deg, #38bdf8, #818cf8); width: 0%; height: 100%; transition: width 0.3s ease; border-radius: 5px; }
        #speed-info { font-size: 0.73rem; color: #475569; text-align: right; }
        button {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a; border: none; padding: 0.9rem;
            border-radius: 0.75rem; font-weight: 700; width: 100%;
            cursor: pointer; font-size: 1rem; letter-spacing: 0.02em;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }
        #status { margin-top: 1rem; font-size: 0.85rem; color: #94a3b8; min-height: 1.5rem; word-break: break-all; line-height: 1.5; }
        #status.success { color: #4ade80; }
        #status.error { color: #f87171; }
        #status.loading { color: #38bdf8; }
    </style>
</head>
<body>
<div class="box">
    <div class="icon">☁️</div>
    <h2>AirShare</h2>
    <p class="subtitle">Drop any file — it lands in the cloud instantly</p>

    <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple onchange="onFileSelected(this)">
        <div class="drop-icon">📂</div>
        <div class="drop-text">Drag & drop or <span>browse files</span></div>
        <div id="file-list"></div>
    </div>

    <div id="progress-section">
        <div id="progress-label">
            <span id="progress-text">Uploading...</span>
            <span id="progress-pct">0%</span>
        </div>
        <div id="prog-container"><div id="prog-bar"></div></div>
        <div id="speed-info"></div>
    </div>

    <button id="uploadBtn" onclick="uploadAll()" disabled>Select files first</button>
    <div id="status"></div>
</div>

<script>
    const WORKER_URL = 'https://gcp-auth-bridge.mail-ashikulislam.workers.dev/';
    const CHUNK_SIZE = 5 * 1024 * 1024;
    const MAX_RETRIES = 3;

    let selectedFiles = [];
    let totalBytes = 0;
    let totalUploaded = 0;
    let speedSampleTime = 0;
    let speedSampleBytes = 0;

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) { selectedFiles = Array.from(e.dataTransfer.files); renderFileList(); }
    });

    function onFileSelected(input) {
        if (input.files.length) { selectedFiles = Array.from(input.files); renderFileList(); }
    }

    function renderFileList() {
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        selectedFiles.forEach((file, i) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.id = `file-item-${i}`;
            item.innerHTML = `
                <span class="file-item-name" title="${file.name}">${file.name}</span>
                <span class="file-item-size">${formatBytes(file.size)}</span>
                <span class="file-item-status" id="file-status-${i}">⏳</span>`;
            list.appendChild(item);
        });
        const btn = document.getElementById('uploadBtn');
        btn.disabled = false;
        btn.innerText = `Upload ${selectedFiles.length} file${selectedFiles.length > 1 ? 's' : ''} ☁️`;
        setStatus('', '');
        document.getElementById('speed-info').innerText = '';
        document.getElementById('progress-section').style.display = 'none';
    }

    function setFileStatus(i, icon) { const el = document.getElementById(`file-status-${i}`); if (el) el.innerText = icon; }
    function setStatus(msg, type) { const el = document.getElementById('status'); el.innerText = msg; el.className = type || ''; }
    function formatBytes(b) {
        if (b >= 1024**3) return (b/1024**3).toFixed(2)+' GB';
        if (b >= 1024**2) return (b/1024**2).toFixed(1)+' MB';
        return (b/1024).toFixed(0)+' KB';
    }
    function formatSpeed(bps) {
        if (bps >= 1024**2) return (bps/1024**2).toFixed(1)+' MB/s';
        return (bps/1024).toFixed(0)+' KB/s';
    }

    function updateProgress(addedBytes, fileName, fileIndex, totalFiles) {
        totalUploaded = Math.min(totalUploaded + addedBytes, totalBytes);
        const pct = Math.round((totalUploaded / totalBytes) * 100);
        document.getElementById('prog-bar').style.width = pct + '%';
        document.getElementById('progress-pct').innerText = pct + '%';
        document.getElementById('progress-text').innerText = `File ${fileIndex+1}/${totalFiles}: ${fileName}`;
        const now = Date.now();
        if (now - speedSampleTime >= 1000) {
            const speed = (totalUploaded - speedSampleBytes) / ((now - speedSampleTime) / 1000);
            if (speed > 0 && totalUploaded < totalBytes) {
                const s = (totalBytes - totalUploaded) / speed;
                document.getElementById('speed-info').innerText = `${formatSpeed(speed)} · ${Math.floor(s/60)}m ${Math.floor(s%60)}s remaining`;
            }
            speedSampleTime = now;
            speedSampleBytes = totalUploaded;
        }
    }

    // Send one chunk. Returns 'done' or 'continue'. Never throws on last-chunk network error.
    async function sendChunk(uploadUrl, chunk, start, fileSize, isLastChunk, attempt = 0) {
        const end = start + chunk.size - 1;
        let res;
        try {
            res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: {
                    'Content-Range': `bytes ${start}-${end}/${fileSize}`,
                    'Content-Type': 'application/octet-stream',
                },
                body: chunk
            });
        } catch (netErr) {
            // Google closes the TCP connection the moment it finishes writing the
            // last chunk to disk. The browser sees this as a network error even
            // though the upload is 100% complete. Treat it as success.
            if (isLastChunk) return 'done';

            // Mid-file network error — retry with exponential backoff
            if (attempt < MAX_RETRIES) {
                await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
                return sendChunk(uploadUrl, chunk, start, fileSize, isLastChunk, attempt + 1);
            }
            throw netErr;
        }

        if (res.status === 200 || res.status === 201) return 'done';
        if (res.status === 308) return 'continue';

        // Google 5xx — retry
        if (res.status >= 500 && attempt < MAX_RETRIES) {
            await new Promise(r => setTimeout(r, Math.pow(2, attempt) * 1000));
            return sendChunk(uploadUrl, chunk, start, fileSize, isLastChunk, attempt + 1);
        }

        throw new Error(`Google returned HTTP ${res.status}`);
    }

    async function uploadSingleFile(file, fileIndex, totalFiles) {
        setFileStatus(fileIndex, '🔄');

        // Ask Worker for a Google resumable upload URL (no file data goes through Cloudflare)
        const workerRes = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {
                'X-File-Name': encodeURIComponent(file.name),
                'X-File-Type': file.type || 'application/octet-stream',
                'X-File-Size': file.size,
            }
        });
        if (!workerRes.ok) {
            const err = await workerRes.json().catch(() => ({}));
            throw new Error(err.error || `Worker returned ${workerRes.status}`);
        }
        const { uploadUrl } = await workerRes.json();

        // Stream chunks straight to Google
        let offset = 0;
        while (offset < file.size) {
            const chunk = file.slice(offset, offset + CHUNK_SIZE);
            const isLastChunk = offset + chunk.size >= file.size;
            const result = await sendChunk(uploadUrl, chunk, offset, file.size, isLastChunk);
            offset += chunk.size;
            updateProgress(chunk.size, file.name, fileIndex, totalFiles);
            if (result === 'done') break;
        }

        setFileStatus(fileIndex, '✅');
    }

    async function uploadAll() {
        if (!selectedFiles.length) return;
        const btn = document.getElementById('uploadBtn');
        btn.disabled = true;
        btn.innerText = 'Uploading...';

        totalBytes = selectedFiles.reduce((s, f) => s + f.size, 0);
        totalUploaded = 0;
        speedSampleTime = Date.now();
        speedSampleBytes = 0;

        document.getElementById('progress-section').style.display = 'block';
        document.getElementById('prog-bar').style.width = '0%';
        document.getElementById('progress-pct').innerText = '0%';
        document.getElementById('speed-info').innerText = '';
        setStatus('', '');

        let ok = 0, fail = 0;
        let bytesAccountedFor = 0;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            try {
                await uploadSingleFile(file, i, selectedFiles.length);
                ok++;
            } catch (err) {
                setFileStatus(i, '❌');
                fail++;
                // Nudge progress past this file so bar doesn't get stuck
                const gap = (bytesAccountedFor + file.size) - totalUploaded;
                if (gap > 0) updateProgress(gap, file.name, i, selectedFiles.length);
                setStatus(`❌ "${file.name}" failed: ${err.message}`, 'error');
                await new Promise(r => setTimeout(r, 1200));
            }
            bytesAccountedFor += file.size;
        }

        document.getElementById('prog-bar').style.width = '100%';
        document.getElementById('progress-pct').innerText = '100%';
        document.getElementById('progress-text').innerText = 'Complete';
        document.getElementById('speed-info').innerText = '';

        setStatus(
            fail === 0
                ? `✅ All ${ok} file${ok > 1 ? 's' : ''} uploaded successfully!`
                : `⚠️ ${ok} succeeded, ${fail} failed.`,
            fail === 0 ? 'success' : 'error'
        );

        btn.innerText = 'Upload More ☁️';
        btn.disabled = false;
        selectedFiles = [];
        document.getElementById('fileInput').value = '';
    }
</script>
</body>
</html>
