<script>
const WORKER_URL = 'https://gcp-auth-bridge.mail-ashikulislam.workers.dev/'; // your worker URL

async function upload() {
  const fileInput = document.getElementById('fileInput');
  const file = fileInput.files[0];
  if (!file) return alert("Select a file first!");

  const btn = document.getElementById('uploadBtn');
  const status = document.getElementById('status');
  const bar = document.getElementById('prog-bar');
  const container = document.getElementById('prog-container');

  btn.disabled = true;
  container.style.display = 'block';
  bar.style.width = '0%';
  status.innerText = "Starting upload...";

  try {
    // For large files, show progress via XHR to the worker
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', WORKER_URL);
      xhr.setRequestHeader('X-File-Name', file.name);
      xhr.setRequestHeader('X-File-Type', file.type || 'application/octet-stream');
      xhr.setRequestHeader('X-File-Size', file.size);

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          bar.style.width = pct + '%';
          status.innerText = `Uploading: ${pct}% (${(e.loaded/1024/1024).toFixed(1)} MB / ${(e.total/1024/1024).toFixed(1)} MB)`;
        }
      };

      xhr.onload = () => {
        if (xhr.status === 200 || xhr.status === 201) {
          const res = JSON.parse(xhr.responseText);
          status.innerText = `✅ Done! "${res.name}" saved to Drive.`;
          fileInput.value = '';
          bar.style.width = '100%';
          resolve();
        } else {
          reject(new Error(`Upload failed: ${xhr.status} — ${xhr.responseText}`));
        }
      };

      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(file);
    });
  } catch (err) {
    status.innerText = '❌ ' + err.message;
  } finally {
    btn.disabled = false;
  }
}
</script>
