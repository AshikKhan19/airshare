<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirShare | Cloud Drop</title>
    <style>
        /* Preserving YOUR original design styles exactly */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 0.3rem; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }

        .drop-zone {
            border: 2px dashed #334155;
            border-radius: 1rem;
            padding: 2rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #38bdf8;
            background: rgba(56,189,248,0.05);
        }
        /* Update for accessibility: multiple selection active but input is hidden */
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .drop-text { color: #94a3b8; font-size: 0.9rem; }
        .drop-text span { color: #38bdf8; }
        #file-name { margin-top: 0.5rem; font-size: 0.8rem; color: #38bdf8; min-height: 1.2rem; }

        #prog-container {
            width: 100%;
            background: #334155;
            height: 10px;
            border-radius: 5px;
            display: none;
            margin-bottom: 0.8rem;
            overflow: hidden;
        }
        #prog-bar {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            width: 0%;
            height: 100%;
            transition: width 0.2s ease;
            border-radius: 5px;
        }
        #speed-info {
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 1rem;
            min-height: 1.2rem;
        }

        button {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            border: none;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.02em;
            transition: opacity 0.2s, transform 0.1s;
        }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }

        #status {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
            min-height: 1.5rem;
            word-break: break-all;
            line-height: 1.5;
        }
        #status.success { color: #4ade80; }
        #status.error { color: #f87171; }
        #status.loading { color: #38bdf8; }
    </style>
</head>
<body>
<div class="box">
    <div class="icon">☁️</div>
    <h2>AirShare</h2>
    <p class="subtitle">Drop any file — it lands in the cloud instantly</p>

    <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" onchange="onFileSelected(this)" multiple>
        <div class="drop-icon">📂</div>
        <div class="drop-text">Drag & drop or <span>browse files</span></div>
        <div id="file-name"></div>
    </div>

    <div id="prog-container"><div id="prog-bar"></div></div>
    <div id="speed-info"></div>

    <button id="uploadBtn" onclick="upload()" disabled>Select a file first</button>
    <div id="status"></div>
</div>

<script>
    /* JavaScript logic updated to support multifile upload sequentially and patch the 200/201 error */
    const WORKER_URL = 'https://gcp-auth-bridge.mail-ashikulislam.workers.dev/';
    const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB chunks
    const MAX_RETRIES = 5;

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            document.getElementById('fileInput').files = files; // Set input.files for sequential processing
            onFileSelected(null); // Direct call for dropped files
        }
    });

    function onFileSelected(input) {
        // Correctly handle both input and dropped files
        const files = input ? input.files : document.getElementById('fileInput').files;
        if (files.length === 0) return;
        
        const count = files.length;
        // Design preservation: update file-name text area with details
        if (count === 1) {
            document.getElementById('file-name').innerText = `${files[0].name} (${formatBytes(files[0].size)})`;
        } else {
            document.getElementById('file-name').innerText = `${count} files selected`;
        }
            
        const btn = document.getElementById('uploadBtn');
        btn.disabled = false;
        // Button update reflects single or multi
        btn.innerText = count === 1 ? 'Upload to Drive ☁️' : `Upload ${count} Files ☁️`;
        setStatus('', '');
        document.getElementById('speed-info').innerText = '';
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.innerText = msg;
        el.className = type || '';
    }

    function formatBytes(bytes) {
        if (bytes >= 1024 ** 3) return (bytes / 1024 ** 3).toFixed(2) + ' GB';
        if (bytes >= 1024 ** 2) return (bytes / 1024 ** 2).toFixed(1) + ' MB';
        return (bytes / 1024).toFixed(0) + ' KB';
    }

    function formatSpeed(bps) {
        if (bps >= 1024 ** 2) return (bps / 1024 ** 2).toFixed(1) + ' MB/s';
        return (bps / 1024).toFixed(0) + ' KB/s';
    }

    // FUNCTION PATCH: Internal retry logic improved, explicitly handles Google's final 200/201 without breaking
    async function uploadChunk(uploadUrl, chunk, start, totalSize, retries = 0) {
        const end = start + chunk.size - 1;
        try {
            const res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: {
                    'Content-Range': `bytes ${start}-${end}/${totalSize}`,
                    'Content-Type': 'application/octet-stream',
                },
                body: chunk
            });

            // 308 = continue. 200/201 = completed
            if (res.status === 308 || res.status === 200 || res.status === 201) {
                return res; 
            }

            // Retry internal logic for server errors
            if (res.status >= 500 && retries < MAX_RETRIES) {
                throw new Error("Retryable server error");
            }
            throw new Error(`Upload failed with status ${res.status}`);
        } catch (err) {
            if (retries < MAX_RETRIES) {
                const delay = Math.pow(2, retries) * 1000;
                await new Promise(r => setTimeout(r, delay));
                return uploadChunk(uploadUrl, chunk, start, totalSize, retries + 1);
            }
            throw err; // Propagate fatal errors
        }
    }

    async function resumeUpload(uploadUrl, totalSize) {
        // Ask Google where to resume from
        const res = await fetch(uploadUrl, {
            method: 'PUT',
            headers: { 'Content-Range': `bytes */${totalSize}` }
        });
        if (res.status === 308) {
            const range = res.headers.get('Range');
            return range ? parseInt(range.split('-')[1]) + 1 : 0;
        }
        if (res.status === 200 || res.status === 201) return totalSize; // already done
        throw new Error('Could not resume upload');
    }

    // FUNCTION FIX (Issue 2): Processes multiple files sequentially inside the standard upload flow
    async function upload() {
        const fileInput = document.getElementById('fileInput');
        const filesList = fileInput.files;
        if (!filesList || filesList.length === 0) return;

        // Convert FileList to Array to iterate easily
        const files = Array.from(filesList);

        const btn = document.getElementById('uploadBtn');
        const bar = document.getElementById('prog-bar');
        const container = document.getElementById('prog-container');
        const speedInfo = document.getElementById('speed-info');

        btn.disabled = true;
        btn.innerText = 'Initializing...';
        container.style.display = 'block';

        // Outer loop for multiple files
        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const filePrefix = files.length > 1 ? `[${i+1}/${files.length}] ` : '';
            
            bar.style.width = '0%';
            speedInfo.innerText = '';
            setStatus(`${filePrefix}Requesting handshake for "${file.name}"...`, 'loading');

            try {
                // Step 1: Handshake remains same
                const workerRes = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'X-File-Name': encodeURIComponent(file.name),
                        'X-File-Type': file.type || 'application/octet-stream',
                        'X-File-Size': file.size,
                    }
                });

                if (!workerRes.ok) {
                    const err = await workerRes.json();
                    throw new Error('Worker error: ' + (err.error || workerRes.status));
                }

                const { uploadUrl } = await workerRes.json();

                // Step 2: Upload direct in chunks
                let offset = 0;
                let lastSpeedUpdate = Date.now();
                let bytesAtLastCheck = 0;

                while (offset < file.size) {
                    const chunk = file.slice(offset, offset + CHUNK_SIZE);
                    const res = await uploadChunk(uploadUrl, chunk, offset, file.size);
                    
                    offset += chunk.size;

                    // Update UI progress for current file
                    const pct = Math.round((offset / file.size) * 100);
                    bar.style.width = pct + '%';

                    const now = Date.now();
                    if (now - lastSpeedUpdate > 1000) {
                        const elapsed = (now - lastSpeedUpdate) / 1000;
                        const speed = (offset - bytesAtLastCheck) / elapsed;
                        // Design preservation: speed output matched to UI
                        speedInfo.innerText = `${formatSpeed(speed)} — Processing: ${filePrefix}${file.name}`;
                        bytesAtLastCheck = offset;
                        lastSpeedUpdate = now;
                    }

                    setStatus(`${filePrefix}Uploading: ${pct}% (${formatBytes(offset)} / ${formatBytes(file.size)})`, 'loading');

                    // FUNCTION FIX (Issue 1): Break the while loop if res.status is 200/201, signaling Google has finalized the file
                    if (res.status === 200 || res.status === 201) break;
                }
            } catch (err) {
                setStatus(`❌ Failure on "${file.name}": ${err.message}`, 'error');
                btn.disabled = false;
                btn.innerText = 'Retry Uploads';
                return; // Stop processing subsequent files on failure
            }
        }

        // All file loops successfully completed
        bar.style.width = '100%';
        speedInfo.innerText = '';
        const successPrefix = files.length > 1 ? `✅ All ${files.length} files` : `✅ "${files[0].name}"`;
        setStatus(`${successPrefix} uploaded successfully to Drive!`, 'success');
        fileInput.value = '';
        document.getElementById('file-name').innerText = '';
        btn.innerText = 'Upload More ☁️';
        btn.disabled = false;
    }
</script>
</body>
</html>
