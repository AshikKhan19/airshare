<input type="file" id="fileInput" onchange="onFileSelected(this)" multiple>

<script>
    const WORKER_URL = 'https://gcp-auth-bridge.mail-ashikulislam.workers.dev/';
    const CHUNK_SIZE = 5 * 1024 * 1024; 
    const MAX_RETRIES = 5;

    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        const files = e.dataTransfer.files;
        if (files.length > 0) {
            document.getElementById('fileInput').files = files;
            onFileSelected(null);
        }
    });

    function onFileSelected(input) {
        const files = input ? input.files : document.getElementById('fileInput').files;
        if (files.length === 0) return;
        
        const count = files.length;
        document.getElementById('file-name').innerText = count === 1 
            ? `${files[0].name} (${formatBytes(files[0].size)})`
            : `${count} files selected`;
            
        const btn = document.getElementById('uploadBtn');
        btn.disabled = false;
        btn.innerText = count === 1 ? 'Upload to Drive ☁️' : `Upload ${count} Files ☁️`;
        setStatus('', '');
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.innerText = msg;
        el.className = type || '';
    }

    function formatBytes(bytes) {
        if (bytes >= 1024 ** 3) return (bytes / 1024 ** 3).toFixed(2) + ' GB';
        if (bytes >= 1024 ** 2) return (bytes / 1024 ** 2).toFixed(1) + ' MB';
        return (bytes / 1024).toFixed(0) + ' KB';
    }

    function formatSpeed(bps) {
        if (bps >= 1024 ** 2) return (bps / 1024 ** 2).toFixed(1) + ' MB/s';
        return (bps / 1024).toFixed(0) + ' KB/s';
    }

    async function uploadChunk(uploadUrl, chunk, start, totalSize, retries = 0) {
        const end = start + chunk.size - 1;
        try {
            const res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: {
                    'Content-Range': `bytes ${start}-${end}/${totalSize}`,
                    'Content-Type': 'application/octet-stream',
                },
                body: chunk
            });

            // FIX 1: Explicitly handle completion and continue status
            if (res.status === 308 || res.status === 200 || res.status === 201) {
                return res;
            }

            if (res.status >= 500 && retries < MAX_RETRIES) {
                throw new Error("Retryable server error");
            }
            throw new Error(`Upload failed with status ${res.status}`);
        } catch (err) {
            if (retries < MAX_RETRIES) {
                const delay = Math.pow(2, retries) * 1000;
                await new Promise(r => setTimeout(r, delay));
                return uploadChunk(uploadUrl, chunk, start, totalSize, retries + 1);
            }
            throw err;
        }
    }

    async function resumeUpload(uploadUrl, totalSize) {
        const res = await fetch(uploadUrl, {
            method: 'PUT',
            headers: { 'Content-Range': `bytes */${totalSize}` }
        });
        if (res.status === 308) {
            const range = res.headers.get('Range');
            return range ? parseInt(range.split('-')[1]) + 1 : 0;
        }
        if (res.status === 200 || res.status === 201) return totalSize;
        throw new Error('Could not resume upload');
    }

    // FIX 2: Multi-file sequential uploader
    async function upload() {
        const fileInput = document.getElementById('fileInput');
        const files = Array.from(fileInput.files);
        if (files.length === 0) return;

        const btn = document.getElementById('uploadBtn');
        const bar = document.getElementById('prog-bar');
        const container = document.getElementById('prog-container');
        const speedInfo = document.getElementById('speed-info');

        btn.disabled = true;
        container.style.display = 'block';

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            const fileLabel = files.length > 1 ? `[${i + 1}/${files.length}] ` : '';
            
            bar.style.width = '0%';
            setStatus(`${fileLabel}Initiating "${file.name}"...`, 'loading');

            try {
                const workerRes = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: {
                        'X-File-Name': encodeURIComponent(file.name),
                        'X-File-Type': file.type || 'application/octet-stream',
                        'X-File-Size': file.size,
                    }
                });

                if (!workerRes.ok) throw new Error('Worker handshake failed');
                const { uploadUrl } = await workerRes.json();

                let offset = 0;
                let lastSpeedUpdate = Date.now();
                let bytesAtLastCheck = 0;

                while (offset < file.size) {
                    const chunk = file.slice(offset, offset + CHUNK_SIZE);
                    const res = await uploadChunk(uploadUrl, chunk, offset, file.size);
                    
                    offset += chunk.size;
                    const pct = Math.round((offset / file.size) * 100);
                    bar.style.width = pct + '%';

                    // Speed calculation
                    const now = Date.now();
                    if (now - lastSpeedUpdate > 1000) {
                        const elapsed = (now - lastSpeedUpdate) / 1000;
                        const speed = (offset - bytesAtLastCheck) / elapsed;
                        speedInfo.innerText = `${formatSpeed(speed)} — ${fileLabel}${file.name}`;
                        bytesAtLastCheck = offset;
                        lastSpeedUpdate = now;
                    }

                    setStatus(`${fileLabel}Uploading: ${pct}%`, 'loading');

                    // If Google returns 200/201, it means the file is finished
                    if (res.status === 200 || res.status === 201) break;
                }
            } catch (err) {
                setStatus(`❌ Error on "${file.name}": ${err.message}`, 'error');
                btn.disabled = false;
                btn.innerText = 'Retry Failed Uploads';
                return; // Stop the loop on error
            }
        }

        // All files finished
        bar.style.width = '100%';
        speedInfo.innerText = '';
        setStatus(`✅ All ${files.length} files uploaded successfully!`, 'success');
        fileInput.value = '';
        document.getElementById('file-name').innerText = '';
        btn.innerText = 'Upload More ☁️';
        btn.disabled = false;
    }
</script>
