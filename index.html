<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AirShare | Cloud Drop</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0f172a;
            color: #f8fafc;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: #1e293b;
            padding: 2.5rem;
            border-radius: 1.5rem;
            width: 100%;
            max-width: 420px;
            text-align: center;
            border: 1px solid #334155;
            box-shadow: 0 10px 40px rgba(0,0,0,0.4);
        }
        .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        h2 { color: #38bdf8; font-size: 1.8rem; margin-bottom: 0.3rem; }
        .subtitle { color: #64748b; font-size: 0.85rem; margin-bottom: 2rem; }

        .drop-zone {
            border: 2px dashed #334155;
            border-radius: 1rem;
            padding: 2rem 1rem;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
            position: relative;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #38bdf8;
            background: rgba(56,189,248,0.05);
        }
        .drop-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }
        .drop-icon { font-size: 2rem; margin-bottom: 0.5rem; }
        .drop-text { color: #94a3b8; font-size: 0.9rem; }
        .drop-text span { color: #38bdf8; }

        #file-list {
            margin-top: 0.75rem;
            text-align: left;
            max-height: 130px;
            overflow-y: auto;
        }
        .file-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.3rem 0.5rem;
            border-radius: 0.4rem;
            font-size: 0.78rem;
            margin-bottom: 0.25rem;
            background: #0f172a;
        }
        .file-item-name {
            color: #94a3b8;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 200px;
        }
        .file-item-size { color: #475569; font-size: 0.72rem; white-space: nowrap; margin-left: 0.4rem; }
        .file-item-status { margin-left: 0.4rem; font-size: 0.8rem; }

        /* Total progress section */
        #progress-section {
            display: none;
            margin-bottom: 1rem;
        }
        #progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.75rem;
            color: #64748b;
            margin-bottom: 0.4rem;
        }
        #progress-label span:last-child { color: #38bdf8; }
        #prog-container {
            width: 100%;
            background: #334155;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 0.4rem;
        }
        #prog-bar {
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            width: 0%;
            height: 100%;
            transition: width 0.3s ease;
            border-radius: 5px;
        }
        #speed-info {
            font-size: 0.73rem;
            color: #475569;
            text-align: right;
        }

        button {
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            color: #0f172a;
            border: none;
            padding: 0.9rem;
            border-radius: 0.75rem;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            font-size: 1rem;
            letter-spacing: 0.02em;
            transition: opacity 0.2s, transform 0.1s;
            margin-bottom: 0;
        }
        button:hover:not(:disabled) { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #334155; color: #64748b; cursor: not-allowed; transform: none; }

        #status {
            margin-top: 1rem;
            font-size: 0.85rem;
            color: #94a3b8;
            min-height: 1.5rem;
            word-break: break-all;
            line-height: 1.5;
        }
        #status.success { color: #4ade80; }
        #status.error { color: #f87171; }
        #status.loading { color: #38bdf8; }
    </style>
</head>
<body>
<div class="box">
    <div class="icon">☁️</div>
    <h2>AirShare</h2>
    <p class="subtitle">Drop any file — it lands in the cloud instantly</p>

    <div class="drop-zone" id="dropZone">
        <input type="file" id="fileInput" multiple onchange="onFileSelected(this)">
        <div class="drop-icon">📂</div>
        <div class="drop-text">Drag & drop or <span>browse files</span></div>
        <div id="file-list"></div>
    </div>

    <!-- Single unified progress bar for entire operation -->
    <div id="progress-section">
        <div id="progress-label">
            <span id="progress-text">Uploading...</span>
            <span id="progress-pct">0%</span>
        </div>
        <div id="prog-container">
            <div id="prog-bar"></div>
        </div>
        <div id="speed-info"></div>
    </div>

    <button id="uploadBtn" onclick="uploadAll()" disabled>Select files first</button>
    <div id="status"></div>
</div>

<script>
    const WORKER_URL = 'https://gcp-auth-bridge.mail-ashikulislam.workers.dev/';
    const CHUNK_SIZE = 5 * 1024 * 1024; // 5MB per chunk
    const MAX_RETRIES = 5;

    let selectedFiles = [];

    // ── Drag and drop ──────────────────────────────────────────────
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', e => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if (e.dataTransfer.files.length) {
            selectedFiles = Array.from(e.dataTransfer.files);
            renderFileList();
        }
    });

    function onFileSelected(input) {
        if (input.files.length) {
            selectedFiles = Array.from(input.files);
            renderFileList();
        }
    }

    function renderFileList() {
        const list = document.getElementById('file-list');
        list.innerHTML = '';
        selectedFiles.forEach((file, i) => {
            const item = document.createElement('div');
            item.className = 'file-item';
            item.id = `file-item-${i}`;
            item.innerHTML = `
                <span class="file-item-name" title="${file.name}">${file.name}</span>
                <span class="file-item-size">${formatBytes(file.size)}</span>
                <span class="file-item-status" id="file-status-${i}">⏳</span>
            `;
            list.appendChild(item);
        });
        const btn = document.getElementById('uploadBtn');
        btn.disabled = false;
        btn.innerText = `Upload ${selectedFiles.length} file${selectedFiles.length > 1 ? 's' : ''} ☁️`;
        setStatus('', '');
        document.getElementById('speed-info').innerText = '';
        document.getElementById('progress-section').style.display = 'none';
    }

    function setFileStatus(index, icon) {
        const el = document.getElementById(`file-status-${index}`);
        if (el) el.innerText = icon;
    }

    function setStatus(msg, type) {
        const el = document.getElementById('status');
        el.innerText = msg;
        el.className = type || '';
    }

    function formatBytes(bytes) {
        if (bytes >= 1024 ** 3) return (bytes / 1024 ** 3).toFixed(2) + ' GB';
        if (bytes >= 1024 ** 2) return (bytes / 1024 ** 2).toFixed(1) + ' MB';
        return (bytes / 1024).toFixed(0) + ' KB';
    }

    function formatSpeed(bps) {
        if (bps >= 1024 ** 2) return (bps / 1024 ** 2).toFixed(1) + ' MB/s';
        return (bps / 1024).toFixed(0) + ' KB/s';
    }

    // ── Progress tracking (total across all files) ─────────────────
    let totalBytes = 0;
    let totalUploaded = 0;
    let speedSampleTime = 0;
    let speedSampleBytes = 0;

    function updateTotalProgress(addedBytes, currentFile, fileIndex, totalFiles) {
        totalUploaded += addedBytes;
        const pct = Math.round((totalUploaded / totalBytes) * 100);

        document.getElementById('prog-bar').style.width = pct + '%';
        document.getElementById('progress-pct').innerText = pct + '%';
        document.getElementById('progress-text').innerText =
            `File ${fileIndex + 1}/${totalFiles}: ${currentFile.name}`;

        const now = Date.now();
        const elapsed = (now - speedSampleTime) / 1000;
        if (elapsed >= 1) {
            const bytesSince = totalUploaded - speedSampleBytes;
            const speed = bytesSince / elapsed;
            const remaining = (totalBytes - totalUploaded) / speed;
            const mins = Math.floor(remaining / 60);
            const secs = Math.floor(remaining % 60);
            document.getElementById('speed-info').innerText =
                speed > 0 ? `${formatSpeed(speed)} · ${mins}m ${secs}s remaining` : '';
            speedSampleTime = now;
            speedSampleBytes = totalUploaded;
        }
    }

    // ── Chunk upload with retry ────────────────────────────────────
    async function uploadChunk(uploadUrl, chunk, start, totalSize, retries = 0) {
        const end = start + chunk.size - 1;

        let res;
        try {
            res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: {
                    'Content-Range': `bytes ${start}-${end}/${totalSize}`,
                    'Content-Type': 'application/octet-stream',
                },
                body: chunk
            });
        } catch (networkErr) {
            // Network error (not an HTTP error) — retry with backoff
            if (retries < MAX_RETRIES) {
                const delay = Math.pow(2, retries) * 1000;
                setStatus(`⚠️ Network hiccup, retrying in ${delay/1000}s...`, 'loading');
                await new Promise(r => setTimeout(r, delay));
                return uploadChunk(uploadUrl, chunk, start, totalSize, retries + 1);
            }
            throw networkErr;
        }

        // 308 Resume Incomplete = chunk received, keep going
        // 200/201 = entire upload is complete
        if (res.status === 308 || res.status === 200 || res.status === 201) {
            return res.status; // return just the status code — never read the body
        }

        // HTTP error from Google — retry 5xx
        if (res.status >= 500 && retries < MAX_RETRIES) {
            const delay = Math.pow(2, retries) * 1000;
            setStatus(`⚠️ Server error ${res.status}, retrying in ${delay/1000}s...`, 'loading');
            await new Promise(r => setTimeout(r, delay));
            return uploadChunk(uploadUrl, chunk, start, totalSize, retries + 1);
        }

        throw new Error(`Chunk failed: HTTP ${res.status}`);
    }

    // Ask Google how many bytes it has received so far (for resume)
    async function queryResumeOffset(uploadUrl, totalSize) {
        let res;
        try {
            res = await fetch(uploadUrl, {
                method: 'PUT',
                headers: { 'Content-Range': `bytes */${totalSize}` }
            });
        } catch (e) {
            throw new Error('Resume query failed: ' + e.message);
        }

        if (res.status === 308) {
            const range = res.headers.get('Range');
            // Range header may be absent if Google received 0 bytes
            return range ? parseInt(range.split('-')[1]) + 1 : 0;
        }
        // 200/201 here means upload was already completed — signal that
        if (res.status === 200 || res.status === 201) return totalSize;

        throw new Error(`Resume query returned HTTP ${res.status}`);
    }

    // ── Upload a single file ───────────────────────────────────────
    async function uploadSingleFile(file, fileIndex, totalFiles) {
        setFileStatus(fileIndex, '🔄');

        // Step 1: Get a resumable upload URL from the Worker
        const workerRes = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {
                'X-File-Name': encodeURIComponent(file.name),
                'X-File-Type': file.type || 'application/octet-stream',
                'X-File-Size': file.size,
            }
        });

        if (!workerRes.ok) {
            const err = await workerRes.json().catch(() => ({ error: workerRes.status }));
            throw new Error('Worker error: ' + (err.error || workerRes.status));
        }

        const { uploadUrl } = await workerRes.json();

        // Step 2: Upload directly to Google in chunks
        let offset = 0;
        let done = false;

        while (!done && offset < file.size) {
            const chunk = file.slice(offset, offset + CHUNK_SIZE);
            const chunkStart = offset;
            let status;

            try {
                status = await uploadChunk(uploadUrl, chunk, chunkStart, file.size);
            } catch (chunkErr) {
                // Chunk threw — either network error exhausted retries, or bad HTTP status.
                // Query Google for how far it got, then resume from there.
                setStatus(`⚠️ Interruption on "${file.name}", resuming...`, 'loading');
                await new Promise(r => setTimeout(r, 2000));

                let resumeOffset;
                try {
                    resumeOffset = await queryResumeOffset(uploadUrl, file.size);
                } catch (resumeErr) {
                    throw new Error(`Could not resume "${file.name}": ${resumeErr.message}`);
                }

                if (resumeOffset >= file.size) {
                    // Google already has everything — treat as done
                    done = true;
                    updateTotalProgress(file.size - offset, file, fileIndex, totalFiles);
                    break;
                }

                // Advance progress tracking to match what Google confirmed
                const confirmed = resumeOffset - offset;
                if (confirmed > 0) updateTotalProgress(confirmed, file, fileIndex, totalFiles);
                offset = resumeOffset;
                continue;
            }

            // Chunk succeeded — advance counters
            const chunkSize = chunk.size;
            offset += chunkSize;
            updateTotalProgress(chunkSize, file, fileIndex, totalFiles);

            // 200 or 201 = upload complete, stop the loop
            if (status === 200 || status === 201) {
                done = true;
            }
        }

        setFileStatus(fileIndex, '✅');
    }

    // ── Upload all selected files sequentially ─────────────────────
    async function uploadAll() {
        if (!selectedFiles.length) return;

        const btn = document.getElementById('uploadBtn');
        btn.disabled = true;
        btn.innerText = 'Uploading...';

        // Calculate grand total bytes for the unified progress bar
        totalBytes = selectedFiles.reduce((sum, f) => sum + f.size, 0);
        totalUploaded = 0;
        speedSampleTime = Date.now();
        speedSampleBytes = 0;

        document.getElementById('progress-section').style.display = 'block';
        document.getElementById('prog-bar').style.width = '0%';
        document.getElementById('progress-pct').innerText = '0%';
        document.getElementById('speed-info').innerText = '';
        setStatus('', '');

        let successCount = 0;
        let failCount = 0;

        for (let i = 0; i < selectedFiles.length; i++) {
            const file = selectedFiles[i];
            try {
                await uploadSingleFile(file, i, selectedFiles.length);
                successCount++;
            } catch (err) {
                setFileStatus(i, '❌');
                failCount++;
                // Account for unuploaded bytes so progress bar stays honest
                const remaining = file.size - (totalUploaded - selectedFiles.slice(0, i).reduce((s, f) => s + f.size, 0));
                // Still advance totalUploaded so bar doesn't get stuck
                totalUploaded = selectedFiles.slice(0, i + 1).reduce((s, f) => s + f.size, 0);
                document.getElementById('prog-bar').style.width =
                    Math.round((totalUploaded / totalBytes) * 100) + '%';
                setStatus(`❌ "${file.name}" failed: ${err.message}`, 'error');
                await new Promise(r => setTimeout(r, 1500));
            }
        }

        // Final state
        document.getElementById('prog-bar').style.width = '100%';
        document.getElementById('progress-pct').innerText = '100%';
        document.getElementById('speed-info').innerText = '';
        document.getElementById('progress-text').innerText = 'Complete';

        if (failCount === 0) {
            setStatus(`✅ All ${successCount} file${successCount > 1 ? 's' : ''} uploaded successfully!`, 'success');
        } else {
            setStatus(`⚠️ ${successCount} succeeded, ${failCount} failed.`, 'error');
        }

        btn.innerText = 'Upload More ☁️';
        btn.disabled = false;
        selectedFiles = [];
        document.getElementById('fileInput').value = '';
    }
</script>
</body>
</html>
